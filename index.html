<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Reloaded</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      color: #39FF14;
    }

    #hud {
      width: 600px;
      display: flex;
      justify-content: space-between;
      padding: 0 4px 8px 4px;
      font-size: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #hud span {
      opacity: 0.85;
    }

    canvas {
      display: block;
      background-color: #111;
      border: 1px solid #1a1a1a;
    }
  </style>
</head>
<body>

  <!-- Score HUD above canvas -->
  <div id="hud">
    <span>Score: <span id="score">0</span></span>
    <span>Best: <span id="highScore">0</span></span>
  </div>

  <canvas id="gameCanvas" width="600" height="600"></canvas>

  <script>
    // ---- Constants ----
    const CANVAS_SIZE  = 600;
    const GRID_COUNT   = 20;
    const CELL_SIZE    = CANVAS_SIZE / GRID_COUNT; // 30px
    const SEGMENT_GAP  = 1;   // px gap between segments for segmented look
    const MOVE_INTERVAL = 150; // ms per step

    const COLOR_BG         = '#111';
    const COLOR_GRID_LINE  = '#1a1a1a';
    const COLOR_SNAKE_HEAD = '#4AFF20';
    const COLOR_SNAKE_BODY = '#39FF14';

    // Directions as {x, y} deltas on the grid
    const DIR = {
      RIGHT: { x: 1,  y: 0  },
      LEFT:  { x: -1, y: 0  },
      UP:    { x: 0,  y: -1 },
      DOWN:  { x: 0,  y: 1  },
    };

    // ---- Canvas setup ----
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');

    // ---- Game state ----
    let snake;       // array of {x, y} grid cells, index 0 = head
    let direction;   // current movement direction
    let nextDir;     // buffered next direction (set on keydown)
    let gameLoop;    // setInterval handle

    // ---- Initialise snake at grid center, 3 segments, moving right ----
    function initSnake() {
      const cx = Math.floor(GRID_COUNT / 2); // 10
      const cy = Math.floor(GRID_COUNT / 2); // 10
      snake = [
        { x: cx,     y: cy }, // head
        { x: cx - 1, y: cy },
        { x: cx - 2, y: cy },
      ];
      direction = DIR.RIGHT;
      nextDir   = DIR.RIGHT;
    }

    // ---- Move snake one step ----
    function stepSnake() {
      direction = nextDir;

      const head    = snake[0];
      const newHead = { x: head.x + direction.x, y: head.y + direction.y };

      // Prepend new head, remove tail (no food logic yet)
      snake.unshift(newHead);
      snake.pop();
    }

    // ---- Input handling ----
    document.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'ArrowRight': case 'd': case 'D':
          if (direction !== DIR.LEFT)  nextDir = DIR.RIGHT; break;
        case 'ArrowLeft':  case 'a': case 'A':
          if (direction !== DIR.RIGHT) nextDir = DIR.LEFT;  break;
        case 'ArrowUp':    case 'w': case 'W':
          if (direction !== DIR.DOWN)  nextDir = DIR.UP;    break;
        case 'ArrowDown':  case 's': case 'S':
          if (direction !== DIR.UP)    nextDir = DIR.DOWN;  break;
      }
    });

    // ---- Draw helpers ----

    function drawBackground() {
      ctx.fillStyle = COLOR_BG;
      ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    }

    function drawGrid() {
      ctx.strokeStyle = COLOR_GRID_LINE;
      ctx.lineWidth   = 1;

      for (let col = 1; col < GRID_COUNT; col++) {
        const x = col * CELL_SIZE;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, CANVAS_SIZE);
        ctx.stroke();
      }

      for (let row = 1; row < GRID_COUNT; row++) {
        const y = row * CELL_SIZE;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(CANVAS_SIZE, y);
        ctx.stroke();
      }
    }

    // Draw a single snake segment with a 1px inset gap on all sides
    function drawSegment(cell, color) {
      const px = cell.x * CELL_SIZE + SEGMENT_GAP;
      const py = cell.y * CELL_SIZE + SEGMENT_GAP;
      const sz = CELL_SIZE - SEGMENT_GAP * 2;
      ctx.fillStyle = color;
      ctx.fillRect(px, py, sz, sz);
    }

    function drawSnake() {
      snake.forEach((seg, i) => {
        drawSegment(seg, i === 0 ? COLOR_SNAKE_HEAD : COLOR_SNAKE_BODY);
      });
    }

    // ---- Game tick ----
    function tick() {
      stepSnake();
      drawBackground();
      drawGrid();
      drawSnake();
    }

    // ---- Start ----
    function startGame() {
      initSnake();
      drawBackground();
      drawGrid();
      drawSnake();
      gameLoop = setInterval(tick, MOVE_INTERVAL);
    }

    startGame();
  </script>
</body>
</html>
