<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Reloaded</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      color: #39FF14;
    }

    #hud {
      width: 600px;
      display: flex;
      justify-content: space-between;
      padding: 0 4px 8px 4px;
      font-size: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #hud span {
      opacity: 0.85;
    }

    canvas {
      display: block;
      background-color: #111;
      border: 1px solid #1a1a1a;
    }
  </style>
</head>
<body>

  <!-- Score HUD above canvas -->
  <div id="hud">
    <span>Score: <span id="score">0</span></span>
    <span>Best: <span id="highScore">0</span></span>
  </div>

  <canvas id="gameCanvas" width="600" height="600"></canvas>

  <script>
    // ---- Constants ----
    const CANVAS_SIZE    = 600;
    const GRID_COUNT     = 30;
    const CELL_SIZE      = CANVAS_SIZE / GRID_COUNT; // 20px
    const SEGMENT_GAP    = 1;
    const MOVE_INTERVAL  = 150; // ms per step
    const SCORE_PER_FOOD = 10;

    const COLOR_BG         = '#111';
    const COLOR_GRID_LINE  = '#1a1a1a';
    const COLOR_SNAKE_HEAD = '#4AFF20';
    const COLOR_SNAKE_BODY = '#39FF14';
    const COLOR_FOOD       = '#FF3131';

    const DIR = {
      RIGHT: { x: 1,  y: 0  },
      LEFT:  { x: -1, y: 0  },
      UP:    { x: 0,  y: -1 },
      DOWN:  { x: 0,  y: 1  },
    };

    // ---- Canvas / DOM ----
    const canvas      = document.getElementById('gameCanvas');
    const ctx         = canvas.getContext('2d');
    const scoreEl     = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');

    // ---- Persistent high score ----
    let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0', 10);
    highScoreEl.textContent = highScore;

    // ---- Game state ----
    let snake;       // [{x,y}, ...], index 0 = head
    let direction;
    let nextDir;
    let food;
    let score;
    let gameLoop;
    let gameOver;    // true when the game has ended

    // ---- Snake init ----
    function initSnake() {
      const cx = Math.floor(GRID_COUNT / 2);
      const cy = Math.floor(GRID_COUNT / 2);
      snake = [
        { x: cx,     y: cy },
        { x: cx - 1, y: cy },
        { x: cx - 2, y: cy },
      ];
      direction = DIR.RIGHT;
      nextDir   = DIR.RIGHT;
    }

    // ---- Food ----
    function spawnFood() {
      const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
      let cell;
      do {
        cell = {
          x: Math.floor(Math.random() * GRID_COUNT),
          y: Math.floor(Math.random() * GRID_COUNT),
        };
      } while (occupied.has(`${cell.x},${cell.y}`));
      food = cell;
    }

    // ---- Score ----
    function updateScore(val) {
      score = val;
      scoreEl.textContent = score;
      if (score > highScore) {
        highScore = score;
        highScoreEl.textContent = highScore;
        localStorage.setItem('snakeHighScore', highScore);
      }
    }

    // ---- Collision checks ----
    function isOutOfBounds(cell) {
      return cell.x < 0 || cell.x >= GRID_COUNT ||
             cell.y < 0 || cell.y >= GRID_COUNT;
    }

    // Check if cell overlaps any segment in snake (skip index 0 = head itself)
    function hitsBody(cell) {
      return snake.slice(1).some(s => s.x === cell.x && s.y === cell.y);
    }

    // ---- Step ----
    function stepSnake() {
      direction = nextDir;

      const head    = snake[0];
      const newHead = { x: head.x + direction.x, y: head.y + direction.y };

      // Collision: wall or self
      if (isOutOfBounds(newHead) || hitsBody(newHead)) {
        endGame();
        return;
      }

      const ate = newHead.x === food.x && newHead.y === food.y;
      snake.unshift(newHead);
      if (!ate) {
        snake.pop();
      } else {
        updateScore(score + SCORE_PER_FOOD);
        spawnFood();
      }
    }

    // ---- Game over ----
    function endGame() {
      clearInterval(gameLoop);
      gameOver = true;
      drawGameOver();
    }

    // ---- Input ----
    document.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'ArrowRight': case 'd': case 'D':
          if (direction !== DIR.LEFT)  nextDir = DIR.RIGHT; break;
        case 'ArrowLeft':  case 'a': case 'A':
          if (direction !== DIR.RIGHT) nextDir = DIR.LEFT;  break;
        case 'ArrowUp':    case 'w': case 'W':
          if (direction !== DIR.DOWN)  nextDir = DIR.UP;    break;
        case 'ArrowDown':  case 's': case 'S':
          if (direction !== DIR.UP)    nextDir = DIR.DOWN;  break;
      }
    });

    // ---- Draw helpers ----

    function drawBackground() {
      ctx.fillStyle = COLOR_BG;
      ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    }

    function drawGrid() {
      ctx.strokeStyle = COLOR_GRID_LINE;
      ctx.lineWidth   = 1;
      for (let col = 1; col < GRID_COUNT; col++) {
        const x = col * CELL_SIZE;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, CANVAS_SIZE);
        ctx.stroke();
      }
      for (let row = 1; row < GRID_COUNT; row++) {
        const y = row * CELL_SIZE;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(CANVAS_SIZE, y);
        ctx.stroke();
      }
    }

    function drawSegment(cell, color) {
      const px = cell.x * CELL_SIZE + SEGMENT_GAP;
      const py = cell.y * CELL_SIZE + SEGMENT_GAP;
      const sz = CELL_SIZE - SEGMENT_GAP * 2;
      ctx.fillStyle = color;
      ctx.fillRect(px, py, sz, sz);
    }

    function drawSnake() {
      snake.forEach((seg, i) => {
        drawSegment(seg, i === 0 ? COLOR_SNAKE_HEAD : COLOR_SNAKE_BODY);
      });
    }

    function drawFood() {
      const cx = food.x * CELL_SIZE + CELL_SIZE / 2;
      const cy = food.y * CELL_SIZE + CELL_SIZE / 2;
      const r  = CELL_SIZE / 2 - SEGMENT_GAP - 1;
      ctx.fillStyle = COLOR_FOOD;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw semi-transparent overlay with game over info
    function drawGameOver() {
      // Dim overlay
      ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
      ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      const isNewHigh = score > 0 && score === highScore;
      const midX = CANVAS_SIZE / 2;

      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';

      // "GAME OVER"
      ctx.fillStyle = '#FF3131';
      ctx.font      = 'bold 48px "Courier New", Courier, monospace';
      ctx.fillText('GAME OVER', midX, 210);

      // Score line
      ctx.fillStyle = '#39FF14';
      ctx.font      = '22px "Courier New", Courier, monospace';
      ctx.fillText(`Score: ${score}`, midX, 278);

      // High score line
      ctx.fillStyle = '#39FF14';
      ctx.font      = '18px "Courier New", Courier, monospace';
      ctx.fillText(`Best: ${highScore}`, midX, 314);

      // New high score banner
      if (isNewHigh) {
        ctx.fillStyle = '#FFD700';
        ctx.font      = 'bold 20px "Courier New", Courier, monospace';
        ctx.fillText('NEW HIGH SCORE!', midX, 354);
      }

      // Restart hint
      ctx.fillStyle = 'rgba(57, 255, 20, 0.5)';
      ctx.font      = '14px "Courier New", Courier, monospace';
      ctx.fillText('Press SPACE to play again', midX, isNewHigh ? 400 : 370);
    }

    // ---- Restart on SPACE after game over ----
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' && gameOver) {
        startGame();
      }
    });

    // ---- Tick ----
    function tick() {
      stepSnake();
      if (gameOver) return;
      drawBackground();
      drawGrid();
      drawFood();
      drawSnake();
    }

    // ---- Start ----
    function startGame() {
      gameOver = false;
      updateScore(0);
      initSnake();
      spawnFood();
      drawBackground();
      drawGrid();
      drawFood();
      drawSnake();
      gameLoop = setInterval(tick, MOVE_INTERVAL);
    }

    startGame();
  </script>
</body>
</html>
